<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Funny Website</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial, Helvetica, sans-serif;
}

.card{
    background:white;
    padding:40px;
    border-radius:15px;
    text-align:center;
    width:350px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:10px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#4a5bdc;
    transform:scale(1.05);
}

#joke{
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="card">
    <h1>😂 Random Joke Machine</h1>
    <p>Click the button if life feels serious.</p>

    <button onclick="showJoke()">Make Me Laugh</button>

    <div id="joke"></div>
</div>

<script>

const jokes = [
"Why do programmers prefer dark mode? Because light attracts bugs 🐛",
"I told my computer I needed a break… now it won't stop sending me KitKat ads 🍫",
"There are 10 types of people: those who understand binary and those who don't 🤓",
"Debugging: Being the detective in a crime movie where you are also the murderer 🕵️‍♂️",
"I changed my password to 'incorrect' so whenever I forget it says: Your password is incorrect 😎"
];

function showJoke(){
    const random = jokes[Math.floor(Math.random()*jokes.length)];
    document.getElementById("joke").innerText = random;
}

</script>

</body>
</html>
